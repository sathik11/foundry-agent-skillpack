# maintenance/versions.yaml — SINGLE SOURCE OF TRUTH for every pinned dependency.
#
# MAINTAINER / CI-ONLY. Lives at repo root, NEVER under .apm/ (so it never ships via
# `apm install`). The generator (maintenance/scripts/sync-versions.py) renders the shipped
# pin files + docs FROM this file. CI (`sync-versions.py --check`) fails if any rendered
# target drifts from here. The watcher (W2) diffs `pin`/`latest_seen` against live PyPI +
# `az provider show` and re-stamps `last_verified`.
#
# Schema:
#   meta.*                       provenance
#   packages[].name              PyPI distribution name
#   packages[].requirement       EXACT string rendered into requirements.txt / tables
#   packages[].floor/ceiling     parsed bounds (watcher uses these)
#   packages[].latest_seen       last value observed on PyPI (W0-T3 / watcher)
#   packages[].deploy_path       all|container|code|caller|optional
#   packages[].lockstep_group    bump together if set
#   packages[].source_url        PyPI project page
#   profiles.*                   ordered lists of package names → which file gets which pins
#   api_versions[]               ARM api-version pins + latest GA observed

