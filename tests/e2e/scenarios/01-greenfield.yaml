# Greenfield smoke journey — scenario 01 (full deploy + verify).
#
# Simple, concrete greenfield: agent-framework template + the PUBLIC, NO-AUTH Microsoft Learn MCP
# tool (https://learn.microsoft.com/api/mcp), deployed for real (azd up) and verified.
# Learn MCP chosen because it needs no API key / no auth (unlike a weather API).
#
# Driver: foundry-engineer agent on gpt-5.3-codex (coding-optimized; gpt-5.4 reasoning stalled — F-C).
#
# AZD-UP HANDLING (F-D): azd up runs ~10-15 min as one command. opencode's bash tool defaults to a
# 120s timeout AND emits no events while a command is in flight (watchdog would false-kill). So the
# prompt instructs the agent to run the long deploy in the BACKGROUND with a log + poll loop, which
# (a) avoids the bash timeout, (b) keeps events flowing so the watchdog sees progress. Budgets are
# also sized generously per infra/COSTS.md.

id: greenfield
title: Greenfield full deploy + verify (Learn MCP, no-auth)
recipe: .agents/skills/foundry-agent-playbook/recipes/01-greenfield-quickstart.md
surfaces: [agent_framework_runtime, public_mcp_learn, azd_up_deploy, verify]

driver:
  agent: foundry-engineer
  model: foundry/gpt-5.3-codex

target:
  subscription: d194e976-63c4-43c9-995a-5340d0daffb1
  resource_group: agentskillpack-testbed-rg
  region: westus
  foundry_account: ai-account-cnkboq4uixafy
  foundry_project: ai-project-skillpack-e2e
  project_endpoint: https://ai-account-cnkboq4uixafy.services.ai.azure.com/api/projects/ai-project-skillpack-e2e
  model_deployment: gpt-4o-mini

prompt: |
  You are the foundry-engineer. Build, DEPLOY, and VERIFY a greenfield Foundry hosted agent end to
  end, working inside this repo. The Foundry baseline is ALREADY provisioned — use it, do NOT create
  or delete baseline infrastructure (project, search, cosmos, registry already exist). The skillpack
  is already installed into this workspace (its scripts live under .agents/skills/, its commands and
  the foundry-engineer persona under .opencode/). Confirmed target facts (do NOT rediscover):

    subscription      = d194e976-63c4-43c9-995a-5340d0daffb1
    resource_group    = agentskillpack-testbed-rg
    region            = westus
    foundry_account   = ai-account-cnkboq4uixafy
    foundry_project   = ai-project-skillpack-e2e
    project_endpoint  = https://ai-account-cnkboq4uixafy.services.ai.azure.com/api/projects/ai-project-skillpack-e2e
    model_deployment  = gpt-4o-mini   (already deployed — use it; do NOT deploy a model)

  You are already logged in to Azure as a service principal with the needed roles. Steps:

  1. SCAFFOLD agents/smoke-greenfield/ from the agent-framework template in
     .agents/skills/foundry-deploy/templates/ (Dockerfile, agent.yaml, main.py,
     requirements.txt). Do NOT edit the template sources.
  2. Add the PUBLIC Microsoft Learn MCP tool (https://learn.microsoft.com/api/mcp — no auth) to
     main.py by uncommenting/wiring the example MCP tool block already present in the template.
  3. Write agents/smoke-greenfield/agent-capabilities.yaml: schema_version 1, agent_kind hosted,
     deploy_mode container, target block from the facts above, model gpt-4o-mini, guardrails layer
     middleware, one toolbox MCP source for Microsoft Learn (public, no auth), no knowledge sources.
  4a. ASSESS: prepare-deploy requires a project topology file first. Run
     .agents/skills/foundry-deploy/scripts/assess-project.sh \
       d194e976-63c4-43c9-995a-5340d0daffb1 agentskillpack-testbed-rg \
       ai-account-cnkboq4uixafy ai-project-skillpack-e2e
     This writes ./assessment/project-topology.json. If it reports multiple candidates, use the
     account/project facts above.
  4. PREFLIGHT: run .agents/skills/foundry-deploy/scripts/prepare-deploy.sh
     agents/smoke-greenfield and ensure it reports azd up is safe.
  5. DEPLOY: initialize with the skillpack's safe-azd-init.sh, then run `azd up`. Because azd up
     takes 10-15 minutes and the shell tool has a short default timeout, run it in the BACKGROUND:
       nohup azd up --no-prompt > /tmp/azd-up.log 2>&1 &
     then POLL /tmp/azd-up.log every ~60 seconds (tail it) until you see success or failure. Do NOT
     block on a single foreground command for more than ~100 seconds. Set azd env values from the
     confirmed facts (AZURE_SUBSCRIPTION_ID, AZURE_RESOURCE_GROUP, AZURE_LOCATION, the project) so
     azd does not prompt.
  6. VERIFY: once deployed, run /verify-agent equivalent — send a test query
     "What is Azure AI Foundry?" to the deployed agent and confirm a non-empty answer. Stamp the
     result into agents/smoke-greenfield/agent-status.json (deploy.status, verify.verdict) using the
     skillpack's agent_status.py helper.

  Rules: never edit files under .agents/skills/ or apm_modules/ (the installed skillpack). Do not
  delete baseline infra. If a command fails, capture the error and STOP — do not retry the same
  failing command more than twice or loop. When polling a background job, tailing the log is
  progress, not a retry. End with a summary of deploy + verify results.

budgets:
  wall_clock: 3600        # 60 min (full real deploy)
  no_progress: 1500       # 25 min — covers the longest single op; the poll loop keeps events flowing
  loop_threshold: 5       # higher: polling the same log tail is expected, not a loop

assertions:
  - kind: path_exists
    path: agents/smoke-greenfield/main.py
    desc: agent scaffolded
  - kind: file_contains
    path: agents/smoke-greenfield/main.py
    contains: learn.microsoft.com/api/mcp
    desc: Learn MCP tool wired into the agent
  - kind: agent_status
    field: deploy.status
    equals: succeeded
    desc: azd up reported a successful deploy
  - kind: agent_status
    field: verify.verdict
    equals: pass
    desc: verify query returned a pass

cleanup:
  teardown_agents: true    # remove the deployed ephemeral agent layer; baseline preserved
