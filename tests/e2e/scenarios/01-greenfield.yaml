# Greenfield smoke journey — scenario 01 (iter-2).
#
# DESIGN NOTE (finding F-B): the shipped /commands (e.g. /plan-agent) are built for an INTERACTIVE
# Copilot session with Foundry MCP tools — they forbid shelling out and use picklists, so they do
# not run cleanly headless. So the driver instead drives the shipped `foundry-engineer` AGENT
# persona (which carries the same skill knowledge) with a CONCRETE, self-contained goal and the
# target facts the interactive discovery steps would otherwise gather. First smoke milestone is the
# headless-achievable slice: scaffold the agent-framework template + fill the manifest + run the
# prepare-deploy preflight. azd up + verify follow once this is green.

id: greenfield
title: Greenfield scaffold + preflight (foundry-engineer, headless)
recipe: foundry-agent-playbook/.apm/skills/foundry-agent-playbook/recipes/01-greenfield-quickstart.md
surfaces: [agent_framework_runtime, scaffold, prepare_deploy_preflight]

driver:
  agent: foundry-engineer          # opencode --agent
  model: foundry/gpt-5.3-codex

# Concrete target facts (injected so the headless agent needs no interactive discovery / MCP).
target:
  subscription: d194e976-63c4-43c9-995a-5340d0daffb1
  resource_group: agentskillpack-testbed-rg
  region: westus
  foundry_account: ai-account-cnkboq4uixafy
  foundry_project: ai-project-skillpack-e2e
  project_endpoint: https://ai-account-cnkboq4uixafy.services.ai.azure.com/api/projects/ai-project-skillpack-e2e
  model_deployment: gpt-4o-mini

prompt: |
  You are the foundry-engineer. Test the skillpack's greenfield scaffold path as a user would,
  WORKING ONLY inside this repo. The Foundry baseline is ALREADY provisioned — do NOT create,
  modify, or delete any Azure infrastructure. Use these CONFIRMED target facts (do not rediscover):

    subscription      = d194e976-63c4-43c9-995a-5340d0daffb1
    resource_group    = agentskillpack-testbed-rg
    region            = westus
    foundry_account   = ai-account-cnkboq4uixafy
    foundry_project   = ai-project-skillpack-e2e
    project_endpoint  = https://ai-account-cnkboq4uixafy.services.ai.azure.com/api/projects/ai-project-skillpack-e2e
    model_deployment  = gpt-4o-mini   (already deployed — use it; do NOT deploy a model)

  Use the foundry-deploy skill's agent-framework template. Do exactly this:

  1. Create the agent folder `agents/smoke-greenfield/` by copying the agent-framework template
     files from `foundry-agent-skillpack/.apm/skills/foundry-deploy/templates/` (Dockerfile,
     agent.yaml, main.py, requirements.txt). Do NOT edit the template sources themselves.
  2. Write `agents/smoke-greenfield/agent-capabilities.yaml` with schema_version 1, agent_kind
     hosted, the `target:` block populated from the confirmed facts above, the model set to
     gpt-4o-mini, guardrails layer `middleware`, and no knowledge sources.
  3. Run the prepare-deploy PREFLIGHT only (validation gates) by executing the script
     `foundry-agent-skillpack/.apm/skills/foundry-deploy/scripts/prepare-deploy.sh` against
     `agents/smoke-greenfield` if it supports a preflight/dry-run, OR run the lighter validators
     it calls (e.g. validate-azure-yaml.sh). Capture the output. Do NOT run `azd up` in this run.

  Rules: never edit files under `foundry-agent-skillpack/.apm/`. Do not provision/delete Azure
  infra. If a command fails, capture the error and STOP — do not retry the same failing command
  more than twice or loop. End by summarizing what you created and the preflight result.

budgets:
  wall_clock: 1800        # 30 min
  no_progress: 600        # 10 min (scaffold + local validators; no long Azure ops in this slice)
  loop_threshold: 3

assertions:
  - kind: path_exists
    path: agents/smoke-greenfield/agent-capabilities.yaml
    desc: manifest written
  - kind: path_exists
    path: agents/smoke-greenfield/main.py
    desc: agent-framework main.py scaffolded
  - kind: path_exists
    path: agents/smoke-greenfield/Dockerfile
    desc: Dockerfile scaffolded
  - kind: path_exists
    path: agents/smoke-greenfield/requirements.txt
    desc: requirements scaffolded
  - kind: file_contains
    path: agents/smoke-greenfield/agent-capabilities.yaml
    contains: ai-project-skillpack-e2e
    desc: manifest carries the confirmed project target

cleanup:
  teardown_agents: false   # nothing deployed in this slice; scaffold is local (gitignored agents/)
