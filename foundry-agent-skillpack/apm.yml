name: foundry-agent-skillpack
version: 0.23.0
# v0.23.0:
#   - Closes TD-24: api-version drift in `az rest` calls. Bumps 5 stale/preview
#     api-versions to current GA (discover-target, check-identities,
#     check-service-endpoint-policy, deep-walk-firewall, two-identities.md).
#     Replaces silent `|| echo '[]'` swallow in discover-target with explicit
#     stderr capture so future drift surfaces instead of returning empty.
#   - Closes TD-25: discover-target.sh enumerated sub-resources only for
#     account[0]. Per-account loop now emits `ACCOUNT_<n>_PROJECT_NAMES=` /
#     `ACCOUNT_<n>_DEPLOYMENT_NAMES=` for accounts [1..N]. Verified on a
#     3-account RG: projects 0→2, deployments 8→19, status partial→complete.
#   - Opens TD-26 (Resource Graph hybrid for discover-target — PoC verified
#     4× faster) and TD-27 (central api-version registry + shared error
#     helper) as preventive follow-ons.
#   - Maintainer-side: foundry-skillpack-builder skill gains invariant #9
#     (api-version pinning rule), authoritative-sources routing table
#     (context7 + Microsoft Learn MCP + `az provider show`), and matching
#     anti-pattern entries.
#   - Fresh-laptop install: ships scripts/install-prereqs.sh at repo root
#     (macOS / Linux / WSL2; auto-detects pkg mgr; --dry-run / --no-python /
#     --no-azd flags; prints "next steps" the script cannot do: az login,
#     subscription pick, RBAC role check). README + docs/install.md +
#     skillpack README now cover prereqs, Windows guidance (WSL2 supported,
#     Git Bash unsupported), and the one-liner curl install.
#   - Opens TD-28 (cross-OS script runtime — bash + pwsh dual-script bake-off,
#     v0.24 candidate). Includes parity-test harness design (mocked `az` +
#     golden fixtures + CI gate on ubuntu/macos/windows) so drift surfaces at
#     PR time, not production-failure time.
#   - Positioning: new "How we fit alongside Microsoft Agent Governance
#     Toolkit (AGT)" section in root README + dedicated docs page
#     `concepts/related-work.md` with the two-layer model, dimension-by-
#     dimension comparison, vocabulary-overlap map, OWASP Agentic Top 10
#     split across both layers, and the adopt-and-integrate stance.
#   - Opens TD-29 (AGT as declarable `runtime_governance: agt` layer in
#     agent-capabilities.yaml — v0.24 candidate). Stated posture: adopt and
#     integrate, not compete. AGT is runtime middleware; we are deploy+
#     lifecycle orchestration. They are complementary layers of the same
#     stack and intended to be used together for production Foundry agents.
# v0.22.0:
#   - Closes TD-23: inbound firewall coverage for Teams / M365 Copilot → private
#     Foundry agent. Ships foundry-teams-workiq/inbound-firewall.md +
#     apim-v2-vnet-integrated.bicep + render-apim-policy.sh + probe-inbound-chain.sh.
#   - Additive `publish.inbound_chain` block in agent-status schema v1.2 (no
#     schema_version bump; ALLOWED_SECTIONS unchanged).
#   - /publish-teams Step 0a branch routes private-Foundry publishes through the
#     inbound-firewall runbook before preflight.
#   - Cross-skill callouts: networking.md Bot Service asymmetry + reply-path
#     allowlist; network-troubleshooter.md symptom triage; failure-modes F-20.
# v0.21.0:
#   - Operator mode: try-first pattern replaces persona-gated runbook-only behavior.
#     New scripts: try-or-runbook.sh, ensure-provider-registration.sh,
#     grant-fabric-workspace-role.sh (partial TD-1 close), rewritten grant-purview-dlp-access.sh.
#   - Discovery scripts: discover-target.sh (account+project+ACR+model in one call),
#     select-model.sh (auto-select when unambiguous), safe-azd-init.sh (guards against
#     file clobber + .git reinit).
#   - Batch preflight: preflight-roles.sh replaces N sequential preflight-role.sh calls.
#   - Prompt fixes: /plan-agent and /prepare-deploy updated to use discovery + batch
#     preflight scripts instead of ad-hoc MCP queries + wrong-interface script calls.
#   - operator-mode.md concept doc under foundry-roles.
# v0.20.0:
#   - Closes TD-2: `/publish-teams` prompt + identity-flip handling (configure-rbac
#     `post_publish` mode + `publish` section in agent-status schema v1.1).
#   - Closes TD-10: deep-network walkers (NSG / Azure Firewall / Service Endpoint
#     Policy) gated behind `--deep`, BYO VNet + PE Bicep scaffold, and the
#     foundry-prod-readiness/network-troubleshooter.md runbook.
#   - TD-19 (alias retirement) remains active; the `aliases:` block below stays
#     for one more release window. A future v0.20.x or v0.21.0 will drop it.
# v0.19.0: package renamed from `foundry-agent-harness` to `foundry-agent-skillpack`.
# The alias keeps the old name resolving for one release; consumers should update
# their `apm.yml` `dependencies:` block before the alias drops. See TD-19.
aliases: [foundry-agent-harness]
description: >
  End-to-end skillpack for Microsoft Foundry hosted agents — knowledge skills,
  slash commands, convergent lifecycle scripts, and durable per-agent state for
  planning, deploying, governing, evaluating, and auditing hosted and prompt
  agents on Foundry.
author: Sathik Basha
license: MIT
repository: https://github.com/sathik11/foundry-agent-skillpack

# APM auto-discovers .apm/skills, .apm/prompts, .apm/agents, .apm/instructions.
includes: auto

# Clients APM should deploy into on `apm install`. APM CLI 0.12+ uses `targets:` (plural).
# - `agent-skills` deploys generic skills into `.agents/skills/...` (works for any client).
# - `copilot` deploys prompts/instructions/chatmodes into `.github/`.
# - Per-client targets (`claude`, `cursor`, `windsurf`, `codex`, `gemini`, `opencode`)
#   write into the matching `.<client>/` folder.
targets: [agent-skills, copilot, claude, cursor, windsurf, codex, gemini, opencode]
