# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
# Informational only. The Foundry REST API (/agents, /agents/{name}/versions) is the source of truth.
name: learn-agent
description: Hosted agent that answers Microsoft questions using the Microsoft Learn MCP.
kind: hosted
protocols:
  - protocol: responses
    version: 1.0.0
environment_variables:
  - name: MODEL_DEPLOYMENT_NAME
    value: gpt-5.4-mini-1
  - name: ENABLE_INSTRUMENTATION
    value: "true"
  - name: ENABLE_SENSITIVE_DATA
    value: "true"
resources:
  cpu: 1
  memory: 2Gi
