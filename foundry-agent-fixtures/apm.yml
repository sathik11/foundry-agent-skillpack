name: foundry-agent-fixtures
version: 0.1.0
description: >
  Runnable fixtures and end-to-end recipes for the foundry-agent-skillpack APM
  package. Opt-in install for learners and smoke testers; consumers using the
  engineering package in production do not need this.
author: Sathik Basha
license: MIT
repository: https://github.com/sathik11/Foundry-Hosted-Agent-Skill

# APM auto-discovers .apm/* directories. We use a custom layout (.apm/fixtures/
# and .apm/recipes/) — these are skill-target assets, not skills/prompts/agents
# themselves. See README.md for the install layout consumers see.
includes: auto

# Ship as agent-skills only — fixtures are static folders, not per-client
# customizations. The engineering package handles the per-client targets.
targets: [agent-skills]
