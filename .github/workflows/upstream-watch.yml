name: upstream-watch

# Twice-weekly watcher: polls PyPI + ARM api-versions + Learn doc topics and emits a
# classified drift report. REPORT-ONLY by default (no PRs) per rollout W7-T3 — the PR/apply
# path is gated behind the `mode=apply` dispatch input and is added incrementally (W2-T4).

on:
  schedule:
    # DETECTION cadence stays fast (twice weekly) so nothing goes stale for long. These runs are
    # REPORT-ONLY and never block. See maintenance/AUTOMATION.md §3/§7 for the cadence split.
    - cron: '17 6 * * 2'   # Tue 06:17 UTC  (detect)
    - cron: '17 6 * * 5'   # Fri 06:17 UTC  (detect)
    # APPLY/PACKAGE review window is monthly (max), per product-owner intent. The 1st-of-month
    # run is where version-drift findings become an auto-PR candidate; feature-candidates are
    # human-gated regardless of schedule (§7).
    - cron: '0 7 1 * *'    # 1st of month 07:00 UTC  (apply/package review)
  workflow_dispatch:
    inputs:
      mode:
        description: 'report-only (default) or apply (open/update rolling PR — not yet enabled)'
        type: choice
        options: [report-only, apply]
        default: report-only
      update_doc_baseline:
        description: 'Record current doc hashes as the new baseline'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # for azure/login OIDC (api-version poll); read-only Azure access
  issues: write     # §7 human-in-the-loop: open/update the rolling triage issue for the PO

concurrency:
  group: upstream-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml packaging

      # Login so the api-version poll (`az provider show`) works. Read-only use here.
      # Prefer the SP-secret style (AZURE_CREDENTIALS) you configure in the portal; fall back
      # to OIDC client-id if that's how you wired it. Auto-skips until one is set.
      - name: Azure login (service principal secret)
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Azure login (OIDC fallback)
        if: ${{ env.AZURE_CREDENTIALS == '' && env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Collect drift
        id: collect
        run: |
          AZFLAG=""
          if ! az account show >/dev/null 2>&1; then AZFLAG="--no-az"; echo "::warning::no Azure login — api-version poll skipped"; fi
          BASEFLAG=""
          if [ "${{ inputs.update_doc_baseline }}" = "true" ]; then BASEFLAG="--update-doc-baseline"; fi
          python maintenance/watch/collect-drift.py $AZFLAG $BASEFLAG \
            --out maintenance/watch/drift-report.json \
            --summary drift-summary.md
          cat drift-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: |
            maintenance/watch/drift-report.json
            drift-summary.md

      # §7 HUMAN-IN-THE-LOOP: route findings to the product owner via a single ROLLING triage
      # issue (find-or-create, never spams). This is how a new feature / recipe / scenario gets
      # in front of a human WITHOUT the scheduled run ever applying it. Non-blocking by design.
      - name: Route findings to product owner (rolling triage issue)
        if: ${{ github.event_name == 'schedule' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '';
            try { summary = fs.readFileSync('drift-summary.md', 'utf8'); } catch (e) {}
            if (summary.length > 50000) summary = summary.slice(0, 50000) + '\n…(truncated)';
            const marker = '<!-- upstream-watch-rolling -->';
            const title = '🔭 Upstream drift triage (rolling)';
            const body = [
              marker,
              `_Last updated: ${new Date().toISOString()} · run ${context.runId}_`,
              '',
              '**Process (see `maintenance/AUTOMATION.md` §7):** version-drift findings are eligible',
              'for the monthly auto-PR window. **New features, new recipes, and new test scenarios',
              'are human-gated** — convert them to a ROADMAP or TECHNICAL_DEBT entry below; the',
              'scheduled run must never apply them on its own.',
              '',
              '### Triage checklist',
              '- [ ] A **new feature** appeared upstream (e.g. a new evaluator like Rubric, a new runtime)? → open a ROADMAP/TD item, then route to normal dev → tester track.',
              '- [ ] A **new recipe / runtime fixture** to support (e.g. LangGraph as a recipe tester)? → add a `tests/e2e/scenarios/*.yaml` + a recipe.',
              '- [ ] A **new test scenario** to cover? → add to the tester track backlog (AUTOMATION.md §6).',
              '- [ ] **Version-drift only**? → leave for the monthly apply window.',
              '',
              '### Latest drift summary',
              summary || '_(no summary artifact produced)_',
            ].join('\n');
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'upstream-watch', per_page: 100 });
            const found = existing.data.find(i => i.body && i.body.includes(marker));
            if (found) {
              await github.rest.issues.update({ owner, repo, issue_number: found.number, body });
              core.notice(`Updated rolling triage issue #${found.number}`);
            } else {
              const created = await github.rest.issues.create({ owner, repo, title, body, labels: ['upstream-watch'] });
              core.notice(`Opened rolling triage issue #${created.data.number}`);
            }

      # ---- report-only stops here. The apply path (W2-T4) is intentionally not wired yet. ----
      - name: Apply mode (disabled in report-only rollout)
        if: ${{ inputs.mode == 'apply' }}
        run: |
          echo "::notice::apply mode requested but the rolling-PR path lands in W2-T4 after the"
          echo "report-only tuning cycle (rollout W7-T3). No PR opened."
