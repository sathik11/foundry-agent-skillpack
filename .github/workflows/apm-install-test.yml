name: APM install smoke test

on:
  pull_request:
    paths:
      - 'foundry-agent-engineering/**'
      - '.github/workflows/apm-install-test.yml'
  push:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install APM
        run: curl -sSL https://aka.ms/apm-unix | sh
      - name: Resolve package as a consumer would
        run: |
          mkdir -p /tmp/consumer && cd /tmp/consumer
          cat > apm.yml <<'EOF'
          name: install-smoke-test
          version: 0.0.1
          dependencies:
            apm:
              - sathik11/Foundry-Hosted-Agent-Skill/foundry-agent-engineering
          EOF
          apm install
          test -d .github/skills -o -d .claude/skills -o -d .agents/skills
          apm audit || true
